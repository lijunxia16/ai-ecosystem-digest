sitemap_sources:
  anthropic:
    - https://www.anthropic.com/sitemap.xml
    - https://www.anthropic.com/news/sitemap.xml
  openai:
    - https://openai.com/sitemap.xml
    - https://openai.com/news/sitemap.xml

github_trending_url: https://github.com/trending?since=daily

topic_labels:
  - ai-agent
  - code-assistant
  - llm
  - multimodal
  - rag
  - mcp

# GitHub Search: dimension label -> query (used in ai-trending.md)
trending_dimensions:
  - emoji: "🔧"
    title_zh: "AI 基础工具"
    title_en: "AI foundations & tooling"
    query: "topic:cli stars:>=1000 archived:false"
  - emoji: "🤖"
    title_zh: "AI 智能体 / 工作流"
    title_en: "Agents & workflows"
    query: "topic:ai-agent stars:>=500 archived:false"
  - emoji: "📦"
    title_zh: "AI 应用"
    title_en: "AI applications"
    query: "topic:machine-learning stars:>=5000 archived:false"
  - emoji: "🧠"
    title_zh: "大模型 / 训练"
    title_en: "Models & training"
    query: "topic:llm stars:>=3000 archived:false"
  - emoji: "🔍"
    title_zh: "RAG / 知识库"
    title_en: "RAG & knowledge"
    query: "topic:rag stars:>=800 archived:false"

claude_skills_search_query: "claude code skills OR anthropic skills"
